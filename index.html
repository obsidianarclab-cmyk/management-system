<!DOCTYPE html>
<html>
<head>
  <title>Obsidian Arc Lab Management System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14; /* black */
      color: #ffffff; /* white */
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: #c2a66b; /* khaki */
      border-bottom: 2px solid #c2a66b;
    }

    .hero h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 16px;
      color: #ddd;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #111;
      padding: 25px;
      border-radius: 15px;
      width: 250px;
      transition: 0.3s;
      border: 1px solid #333;
    }

    .card:hover {
      transform: translateY(-8px);
      border: 1px solid #c2a66b;
      box-shadow: 0 0 15px rgba(194,166,107,0.3);
    }

    .card h3 {
      color: #c2a66b; /* khaki */
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #c2a66b; /* khaki */
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #e0c27a;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<!-- HERO SECTION -->
<div class="hero">
  <h1>Obsidian Arc Lab</h1>
  <p>Smart Expense & Order Management System</p>
</div>

<!-- MAIN MENU -->
<div class="container">

  <div class="menu">

    <div class="card">
      <h3>💳 Expense Tracker</h3>
      <p>Track company & personal expenses</p>
      <a href="payment.html" class="btn">Open</a>
    </div>

    <div class="card">
      <h3>📦 Order Management</h3>
      <p>Track customer order</p>
      <a href="order.html" class="btn">Open</a>
    </div>

  </div>

  <div class="footer">
    Designed for Obsidian Arc Lab Internal System
  </div>

</div>

</body>
</html>
