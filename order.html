<!DOCTYPE html>
<html>
<head>
<title>Obsidian Arc Lab - Orders</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  border-bottom:2px solid #c2a66b;
  background:linear-gradient(90deg,#000,#111);
}

.header h2{
  margin:0;
  color:#c2a66b;
  letter-spacing:3px;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-top:20px;
}

.card{
  padding:15px 25px;
  border-radius:12px;
  min-width:120px;
  text-align:center;
  font-weight:bold;
  border:1px solid #444;
}

.total{ background:#111; border-color:#c2a66b; }
.pending{ background:#3b0a0a; }
.progress{ background:#3b2a05; }
.done{ background:#0b3b1a; }

.count{
  font-size:24px;
  margin-top:5px;
}

/* 🔴 BLINK */
.blink{
  animation:blink 1s infinite;
  border:2px solid red !important;
}

@keyframes blink{
  0%{box-shadow:0 0 5px red;}
  50%{box-shadow:0 0 20px red;}
  100%{box-shadow:0 0 5px red;}
}

/* SEARCH */
.searchBox{
  text-align:center;
  margin-top:15px;
}

.searchBox input{
  width:300px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  padding:10px;
  color:#c2a66b;
  border-bottom:1px solid #333;
}

td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #333;
}

/* BUTTON */
button{
  padding:6px 10px;
  border-radius:5px;
  background:#c2a66b;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#e0c27a;
}

/* STATUS */
select{
  padding:5px;
  border-radius:5px;
  color:white;
  border:1px solid #444;
  font-size:12px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
<h2>OBSIDIAN ARC LAB</h2>
<p>ORDER MANAGEMENT SYSTEM</p>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <div class="card total">
    TOTAL
    <div class="count" id="total">0</div>
  </div>

  <div class="card pending" id="pendingCard">
    PENDING
    <div class="count" id="pending">0</div>
  </div>

  <div class="card progress">
    PROGRESS
    <div class="count" id="progress">0</div>
  </div>

  <div class="card done">
    COMPLETED
    <div class="count" id="done">0</div>
  </div>

</div>

<!-- SEARCH -->
<div class="searchBox">
<input type="text" id="search" placeholder="Search Order / Name / Phone..." onkeyup="renderTable()">
</div>

<table>
<thead>
<tr>
<th>Order Id</th>
<th>DateTime</th>
<th>Customer Name</th>
<th>Customer PhoneNo</th>
<th>Receiver Name</th>
<th>Receiver PhoneNo</th>
<th>Address</th>
<th>Status</th>
<th>Receipt</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzmTD4ct44yQVxZ2H6yoX8JYbSiyVyot-Ge-YHLnvmqhNuC8V_flpQpZewfVrE9OR81/exec";

let dataStore = [];

/* DATE */
function formatDateTime(dt){
  if(!dt) return "";
  return new Date(dt).toLocaleString();
}

/* LOAD */
function loadData(){
fetch(URL)
.then(res=>res.text())
.then(text=>{
  dataStore = JSON.parse(text);
  updateDashboard();
  renderTable();
});
}

/* DASHBOARD */
function updateDashboard(){

let total = dataStore.length;
let pending = dataStore.filter(x=>x.status==="Pending").length;
let progress = dataStore.filter(x=>x.status==="Progress").length;
let done = dataStore.filter(x=>x.status==="Complete Order").length;

document.getElementById("total").innerText = total;
document.getElementById("pending").innerText = pending;
document.getElementById("progress").innerText = progress;
document.getElementById("done").innerText = done;

/* BLINK IF PENDING > 0 */
let card = document.getElementById("pendingCard");

if(pending > 0){
  card.classList.add("blink");
}else{
  card.classList.remove("blink");
}

}

/* TABLE */
function renderTable(){

let search = document.getElementById("search").value.toLowerCase();
let html = "";

dataStore.forEach((r,i)=>{

let text = (r.orderId+r.customerName+r.customerNo).toLowerCase();
if(!text.includes(search)) return;

/* STATUS COLOR */
let bg = "#222";
if(r.status==="Pending") bg="#7f1d1d";
else if(r.status==="Progress") bg="#854d0e";
else if(r.status==="Complete Order") bg="#14532d";

html += `
<tr>
<td>${r.orderId||""}</td>
<td>${formatDateTime(r.dateTime)}</td>
<td>${r.customerName||""}</td>
<td>${r.customerNo||""}</td>
<td>${r.receiverName||""}</td>
<td>${r.receiverPhone||""}</td>
<td>${r.receiverAddress||""}</td>


<td>
<select id="status-${i}" style="background:${bg};color:white;font-weight:bold;">
<option ${r.status==="Pending"?"selected":""}>Pending</option>
<option ${r.status==="Progress"?"selected":""}>Progress</option>
<option ${r.status==="Complete Order"?"selected":""}>Complete Order</option>
</select>
</td>

<td>
<button onclick="openReceipt(${i})">View</button>
</td>

<td>
<button onclick="updateStatus(${i})">Update</button>
</td>
</tr>
`;
});

document.getElementById("table").innerHTML = html;
}

/* UPDATE STATUS (IMPORTANT FIX) */
function updateStatus(index){

let newStatus = document.getElementById("status-"+index).value;

fetch(URL,{
  method:"POST",
  headers:{
    "Content-Type":"application/x-www-form-urlencoded"
  },
  body:new URLSearchParams({
    action:"update",
    orderId: dataStore[index].orderId,
    status:newStatus
  })
})
.then(res=>res.text())
.then(res=>{
  alert("Updated!");
  loadData();
})
.catch(err=>{
  alert("Error updating");
});

}

/* RECEIPT */
function openReceipt(i){
let url = dataStore[i].receiptLink;
if(!url) return alert("No receipt");
window.open(url,"_blank");
}

loadData();

</script>

</body>
</html>
